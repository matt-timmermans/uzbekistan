const cal = [{"d": 6, "m": "jul", "label": "Arrive Tashkent", "sub": "Batik Air via KL", "country": "uz", "type": "travel", "icon": "plane", "detail": "Batik Air OD172 + OD751 via KL. Arrive late evening. SIM at airport. Yandex taxi to Leader Hotel.", "sights": [], "tips": "Download: Yandex Go, UZ Railway, Maps.me, Google Translate offline.", "cost": "Booked", "hotel": "Leader Hotel"}, {"d": 7, "m": "jul", "label": "Soviet Tashkent", "sub": "Metro + Plov Center + Chorsu", "country": "uz", "type": "explore", "icon": "building", "detail": "Metro art gallery tour (Kosmonavtlar, Alisher Navoi). Soviet mosaics on Shota Rustaveli. Lunch at Plov Center. Chorsu Bazaar. Sunset at Khast Imam + oldest Quran.", "sights": ["Tashkent Metro stations", "Soviet mosaics", "Central Asian Plov Center", "Chorsu Bazaar", "Khast Imam + oldest Quran"], "tips": "Metro $0.10/ride. Plov Center peaks 1pm. Try qurt at the bazaar.", "cost": "Food $10", "hotel": "Leader Hotel"}, {"d": 8, "m": "jul", "label": "Work + Museums", "sub": "Minor Mosque sunset", "country": "uz", "type": "work", "icon": "laptop", "detail": "Morning work. Museum of Applied Arts (near Leader Hotel). Broadway street. Minor Mosque at sunset. Pack for train.", "sights": ["Museum of Applied Arts", "Broadway street", "Minor Mosque at sunset"], "tips": "Museum is 5 min from Leader Hotel. Minor Mosque provides free capes.", "cost": "Coworking $10", "hotel": "Leader Hotel"}, {"d": 9, "m": "jul", "label": "To Samarkand", "sub": "Nasaf train 8:51am", "country": "uz", "type": "travel", "icon": "train", "detail": "Nasaf train 8:51am to 12:11pm (Ref: 74765183079263). Check into Horizon Boutique. Afternoon work. Registan at golden hour. 8pm light show.", "sights": ["First Registan at golden hour", "Light show 8pm"], "tips": "July 35-40C: sights early/late, work midday.", "cost": "Train BOOKED", "hotel": "Horizon Boutique"}, {"d": 10, "m": "jul", "label": "Work + Konigil", "sub": "Paper mill + observatory", "country": "uz", "type": "work", "icon": "laptop", "detail": "Morning work. Afternoon: Konigil paper mill (mulberry bark paper, 400 yrs lifespan). Pottery workshop. Riverside tea. Ulugh Beg Observatory.", "sights": ["Meros Paper Mill", "Pottery workshops", "Ulugh Beg Observatory", "Afrasiab Museum"], "tips": "Konigil missed by 90% of tourists. Buy handmade stationery.", "cost": "Taxi $6", "hotel": "Horizon Boutique"}, {"d": 11, "m": "jul", "label": "Samarkand Classics", "sub": "Shah-i-Zinda + Registan", "country": "uz", "type": "adventure", "icon": "star", "detail": "7am Shah-i-Zinda. Bibi-Khanym. Siab Bazaar. Gur-e-Amir at sunset. Registan x2. Hazrat Khizr terrace.", "sights": ["Shah-i-Zinda at 7am", "Bibi-Khanym Mosque", "Siab Bazaar", "Gur-e-Amir at sunset", "Hazrat Khizr terrace"], "tips": "Shah-i-Zinda at 7am = near empty, incredible light.", "cost": "Entry $15", "hotel": "Horizon Boutique"}, {"d": 12, "m": "jul", "label": "Shakhrisabz", "sub": "Tamerlane's birthplace", "country": "uz", "type": "adventure", "icon": "mountain", "detail": "Day trip over mountain pass. Ak-Saray Palace. Kok Gumbaz. Chor-Chinor 1,000-yr sycamores. Tandyr lamb.", "sights": ["Mountain pass drive", "Ak-Saray Palace", "Chor-Chinor sycamores", "Tandyr lamb"], "tips": "Driver via hotel $35-40. Sit front for views.", "cost": "Driver $40", "hotel": "Horizon Boutique"}, {"d": 13, "m": "jul", "label": "Work + Plov Class", "sub": "Carpet factory", "country": "uz", "type": "work", "icon": "laptop", "detail": "Morning work. Hudjum Silk Carpet Factory. Evening plov cooking class. Optional dawn Registan 5:30am.", "sights": ["Carpet Factory", "Plov class", "Registan at dawn"], "tips": "Plov class $10-15. Dawn Registan = no tourists.", "cost": "Class $12", "hotel": "Horizon Boutique"}, {"d": 14, "m": "jul", "label": "To Tajikistan", "sub": "Penjikent + Sarazm", "country": "tj", "type": "travel", "icon": "car", "detail": "Jartepa border. Shared taxi to Penjikent. Afternoon: Sarazm UNESCO (3500 BC), ancient ruins, Rudaki Museum. E // For a week, clip bookings to the week and assign lanes (overlap allowed -> stacked)
function weekBars(week) {
  const ws = idx(week[0].m, week[0].d);
  const we = idx(week[6].m, week[6].d);
  let segs = [];
  bookings.forEach((b) => {
    const bs = idx(b.sM, b.sD);
    const be = idx(b.eM, b.eD);
    const s = Math.max(bs, ws);
    const e = Math.min(be, we);
    if (s <= e) {
      segs.push({ label: b.label, country: b.country, trek: b.trek, booked: b.booked, start: s - ws, end: e - ws, fullStart: bs, span: be - bs });
    }
  });
  // longest / earliest bookings get lower lanes (drawn on top)
  segs.sort((a, b) => (a.fullStart - b.fullStart) || (b.span - a.span));
  const lanes = []; // each lane = array of placed segs
  segs.forEach((seg) => {
    let placed = false;
    for (let L = 0; L < lanes.length; L++) {
      const clash = lanes[L].some((o) => !(seg.end < o.start || seg.start > o.end));
      if (!clash) { seg.lane = L; lanes[L].push(seg); placed = true; break; }
    }
    if (!placed) { seg.lane = lanes.length; lanes.push([seg]); }
  });
  return { segs, laneCount: Math.max(1, lanes.length) };
}

function defaultSel() {
  const now = new Date();
  const y = now.getFullYear();
  const mo = now.getMonth(); // 0=Jan
  const day = now.getDate();
  // Trip runs Jul 6 - Aug 6, 2026. If today is inside that window, select it.
  if (y === 2026 && mo === 6 && day >= 6) return { m: "jul", d: day };
  if (y === 2026 && mo === 7 && day <= 6) return { m: "aug", d: day };
  return { m: "jul", d: 6 }; // before/after the trip: default to day 1
}

  const [tab, setTab] = useState("calendar");
  const [sel, setSel] = useState(defaultSel);
  const selDay = calMap[key(sel.m, sel.d)];
  const selNight = nightMap[key(sel.m, sel.d)];
  const tL = Object.values(budgetSummary).reduce((s, v) => s + v.low, 0);
  const tH = Object.values(budgetSummary).reduce((s, v) => s + v.high, 0);

  return (
    <div style={{ fontFamily: "'Crimson Pro','Georgia',serif", background: "linear-gradient(180deg,#0a0a12 0%,#12121f 45%,#1a1a2e 100%)", color: "#e8e0d4", minHeight: "100vh" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600;700&family=DM+Sans:wght@400;500;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        .fb{animation:fi .3s ease}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes sh{0%{background-position:-200% center}100%{background-position:200% center}}
        .tb{cursor:pointer;padding:9px 16px;border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:12.5px;transition:all .2s;white-space:nowrap}
        .tb:hover{border-color:rgba(255,255,255,.25)}
        .ta{background:rgba(233,179,68,.15);border-color:#e9b344 !important;color:#e9b344}
        .calscroll::-webkit-scrollbar{height:6px}
        .calscroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
        .daycell:hover{background:rgba(255,255,255,.06) !important}
      `}</style>

      <div style={{ padding: "34px 24px 14px", textAlign: "center" }}>
        <h1 style={{ fontSize: "clamp(24px,5vw,34px)", fontWeight: 300, lineHeight: 1.2, marginBottom: "8px", background: "linear-gradient(135deg,#e8e0d4 0%,#e9b344 50%,#e94560 100%)", backgroundSize: "200% auto", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", animation: "sh 6s linear infinite" }}>The Silk Road Month</h1>
        <p style={{ ...dm, fontSize: "12px", color: "rgba(232,224,212,.45)" }}>July 6 {"\u2014"} Aug 6, 2026</p>
        <div style={{ display: "flex", justifyContent: "center", gap: "12px", marginTop: "10px", flexWrap: "wrap" }}>
          {[["uz", "Uzbekistan", "14d"], ["tj", "Tajikistan", "2d"], ["kg", "Kyrgyzstan", "14d"]].map(([k, n, d]) => (
            <div key={k} style={{ display: "flex", alignItems: "center", gap: "5px", ...dm, fontSize: "11px", color: "rgba(232,224,212,.5)" }}>
              <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: cc[k] }} />{n} ({d})
            </div>
          ))}
        </div>
      </div>

      <div style={{ display: "flex", justifyContent: "center", gap: "8px", padding: "8px 16px 18px", maxWidth: "640px", margin: "0 auto" }}>
        {[["calendar", "Calendar"], ["stays", "Stays & Booking"], ["budget", "Budget"]].map(([id, l]) => (
          <div key={id} className={"tb " + (tab === id ? "ta" : "")} style={dm} onClick={() => setTab(id)}>{l}</div>
        ))}
      </div>

      {tab === "calendar" && (
        <div style={{ maxWidth: "920px", margin: "0 auto", padding: "0 12px 24px" }}>
          <div className="calscroll" style={{ overflowX: "auto", paddingBottom: "8px" }}>
            <div style={{ minWidth: "720px" }}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: "4px", marginBottom: "6px" }}>
                {["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"].map((d, i) => (
                  <div key={i} style={{ textAlign: "center", ...dm, fontSize: "10px", letterSpacing: "1px", textTransform: "uppercase", color: "rgba(232,224,212,.35)", paddingBottom: "2px" }}>{d}</div>
                ))}
              </div>

              {weeks.map((week, wi) => {
                const { segs, laneCount } = weekBars(week);
                const barBand = laneCount * LANE_H;
                const cellMin = DATE_BAND + barBand + 40;
                return (
                  <div key={wi} style={{ position: "relative", marginBottom: "4px" }}>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: "4px" }}>
                      {week.map((cell, ci) => {
                        const active = inTrip(cell.m, cell.d);
                        const info = calMap[key(cell.m, cell.d)];
                        const isSel = sel.m === cell.m && sel.d === cell.d;
                        const col = info ? cc[info.country] : "rgba(255,255,255,.1)";
                        return (
                          <div
                            key={ci}
                            className={active ? "daycell" : ""}
                            onClick={() => active && setSel({ m: cell.m, d: cell.d })}
                            style={{
                              minHeight: cellMin + "px",
                              borderRadius: "8px",
                              background: isSel ? col + "1f" : active ? "rgba(255,255,255,.03)" : "transparent",
                              border: isSel ? "2px solid " + col : active ? "1px solid rgba(255,255,255,.07)" : "1px solid transparent",
                              opacity: active ? 1 : 0.22,
                              cursor: active ? "pointer" : "default",
                              padding: "6px 7px 7px",
                              position: "relative",
                              transition: "all .15s ease",
                            }}
                          >
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                              <span style={{ fontSize: "9px" }}>{info ? ICON[info.icon] : ""}</span>
                              <span style={{
                                ...dm, fontSize: "12px", fontWeight: (isSel || isToday(cell.m, cell.d)) ? 700 : 500,
                                color: isToday(cell.m, cell.d) ? "#0a0a12" : isSel ? col : "rgba(232,224,212,.7)",
                                background: isToday(cell.m, cell.d) ? "#e9b344" : "transparent",
                                borderRadius: "999px", minWidth: "18px", height: "18px",
                                display: "inline-flex", alignItems: "center", justifyContent: "center", padding: "0 5px",
                              }}>
                                {cell.d === 1 && cell.m === "aug" ? "1 Aug" : cell.d}
                              </span>
                            </div>
                            <div style={{ height: barBand + "px" }} />
                            {info && (
                              <div style={{ ...dm, fontSize: "10px", lineHeight: 1.25, color: "rgba(232,224,212,.85)", marginTop: "2px", overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>
                                <span style={{ display: "inline-block", width: "5px", height: "5px", borderRadius: "50%", background: col, marginRight: "4px", verticalAlign: "middle" }} />
                                {info.label}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>

                    {/* Stacked stay bars (overlap allowed) */}
                    {segs.map((seg, si) => {
                      const span = seg.end - seg.start + 1;
                      const leftPct = (seg.start / 7) * 100;
                      const widthPct = (span / 7) * 100;
                      const col = cc[seg.country];
                      const top = DATE_BAND + 2 + seg.lane * LANE_H;
                      return (
                        <div
                          key={si}
                          title={seg.label}
                          style={{
                            position: "absolute",
                            top: top + "px",
                            left: "calc(" + leftPct + "% + 3px)",
                            width: "calc(" + widthPct + "% - 6px)",
                            height: (LANE_H - 3) + "px",
                            background: seg.booked ? col + "33" : col + "12",
                            border: "1px " + (seg.booked ? "solid" : "dashed") + " " + col + (seg.booked ? "88" : "99"),
                            borderRadius: "5px",
                            display: "flex",
                            alignItems: "center",
                            paddingLeft: "6px",
                            pointerEvents: "none",
                            overflow: "hidden",
                          }}
                        >
                          <span style={{ ...dm, fontSize: "9px", fontWeight: 600, color: col, whiteSpace: "nowrap", textOverflow: "ellipsis", overflow: "hidden" }}>
                            {seg.booked ? "\u2713 " : ""}{seg.trek ? "\uD83D\uDC0E " : ""}{seg.label}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{ ...dm, fontSize: "10px", color: "rgba(232,224,212,.3)", textAlign: "center", margin: "6px 0 14px", lineHeight: 1.6 }}>
            Solid bar = booked {"\u00b7"} dashed = still to book {"\u00b7"} changeover day shows both hotels {"\u00b7"} tap any day for the plan
          </div>

          {selDay && (
            <div className="fb" key={sel.m + "-" + sel.d} style={{ background: "linear-gradient(135deg,#1a1a2e," + cc[selDay.country] + "12)", border: "1px solid " + cc[selDay.country] + "33", borderRadius: "14px", padding: "18px", maxWidth: "560px", margin: "0 auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "10px" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ ...dm, fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase", color: cc[selDay.country], marginBottom: "4px" }}>
                    {sel.m === "jul" ? "July " + sel.d : "Aug " + sel.d} {"\u00b7"} {cn[selDay.country]}
                  </div>
                  <div style={{ fontSize: "20px", fontWeight: 600, lineHeight: 1.2, marginBottom: "2px" }}>{ICON[selDay.icon]} {selDay.label}</div>
                  <div style={{ ...dm, fontSize: "12px", color: "rgba(232,224,212,.5)" }}>{selDay.sub}</div>
                </div>
                {selNight && (
                  <div style={{ ...dm, fontSize: "10px", color: "rgba(232,224,212,.45)", textAlign: "right", maxWidth: "120px", lineHeight: 1.4 }}>
                    {"\uD83C\uDFE8"} {selNight.label}
                  </div>
                )}
              </div>

              <p style={{ fontSize: "13px", lineHeight: 1.7, color: "rgba(232,224,212,.8)", marginBottom: "12px" }}>{selDay.detail}</p>

              {selDay.sights && selDay.sights.length > 0 && (
                <div style={{ background: "rgba(15,52,96,.2)", border: "1px solid rgba(15,52,96,.3)", borderRadius: "8px", padding: "10px 12px", marginBottom: "10px" }}>
                  <div style={{ ...dm, fontSize: "9px", letterSpacing: "2px", textTransform: "uppercase", color: "#4a90d9", marginBottom: "6px" }}>Don't miss</div>
                  {selDay.sights.map((s, j) => (
                    <div key={j} style={{ fontSize: "11.5px", lineHeight: 1.4, color: "rgba(232,224,212,.65)", ...dm, paddingLeft: "10px", borderLeft: "2px solid rgba(74,144,217,.25)", marginBottom: j < selDay.sights.length - 1 ? "5px" : 0 }}>{s}</div>
                  ))}
                </div>
              )}

              {selDay.tips && (
                <div style={{ background: "rgba(233,179,68,.08)", border: "1px solid rgba(233,179,68,.15)", borderRadius: "8px", padding: "10px 12px", marginBottom: selDay.cost ? "10px" : 0 }}>
                  <div style={{ ...dm, fontSize: "9px", letterSpacing: "2px", textTransform: "uppercase", color: "#e9b344", marginBottom: "5px" }}>Tip</div>
                  <p style={{ fontSize: "11.5px", lineHeight: 1.5, color: "rgba(232,224,212,.7)", ...dm }}>{selDay.tips}</p>
                </div>
              )}

              {selDay.cost && (
                <div style={{ ...dm, fontSize: "11px", color: "rgba(232,224,212,.4)" }}>Est. cost: <span style={{ color: "#e9b344" }}>{selDay.cost}</span></div>
              )}
            </div>
          )}
        </div>
      )}

      {tab === "stays" && (
        <div style={{ padding: "12px 16px 48px", maxWidth: "640px", margin: "0 auto" }}>
          <p style={{ ...dm, fontSize: "12px", color: "rgba(232,224,212,.45)", marginBottom: "16px", lineHeight: 1.6, textAlign: "center" }}>
            Bishkek apartment = home base for all of Kyrgyzstan. Leave your bag there during the trek + Issyk-Kul loop.
          </p>
          {stays.map((s, i) => {
            const col = ccStay[s.country] || "#e8e0d4";
            return (
              <div key={i} style={{ background: s.booked ? "rgba(233,179,68,.06)" : "rgba(255,255,255,.03)", border: "1px solid " + (s.booked ? "rgba(233,179,68,.2)" : "rgba(255,255,255,.06)"), borderRadius: "12px", padding: "14px 16px", marginBottom: "10px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "4px" }}>
                  <div>
                    <div style={{ fontSize: "16px", fontWeight: 600 }}>{s.city}</div>
                    <div style={{ ...dm, fontSize: "13px", color: "rgba(232,224,212,.8)", marginTop: "1px" }}>{s.hotel}</div>
                    <div style={{ ...dm, fontSize: "10.5px", color: col, marginTop: "2px" }}>{s.country}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ ...dm, fontSize: "20px", fontWeight: 600, color: "#e9b344" }}>{s.nights}</div>
                    <div style={{ ...dm, fontSize: "8px", letterSpacing: "1px", textTransform: "uppercase", color: "rgba(232,224,212,.35)" }}>nights</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: "6px", alignItems: "center", marginBottom: "8px", flexWrap: "wrap" }}>
                  <div style={{ ...dm, fontSize: "12.5px", background: "rgba(255,255,255,.05)", padding: "3px 9px", borderRadius: "6px" }}>{s.checkin}</div>
                  <div style={{ ...dm, fontSize: "10px", color: "rgba(232,224,212,.25)" }}>{"\u2192"}</div>
                  <div style={{ ...dm, fontSize: "12.5px", background: "rgba(255,255,255,.05)", padding: "3px 9px", borderRadius: "6px" }}>{s.checkout}</div>
                  <div style={{ marginLeft: "auto", ...dm, fontSize: "11.5px", color: s.booked ? "#4ade80" : "#e9b344", fontWeight: s.booked ? 600 : 400 }}>{s.booked ? "\u2713 " : ""}{s.price}</div>
                </div>
                <p style={{ ...dm, fontSize: "11.5px", lineHeight: 1.5, color: "rgba(232,224,212,.55)" }}>{s.note}</p>
                {s.bookAdvance && !s.booked && (
                  <div style={{ marginTop: "6px", ...dm, fontSize: "9px", letterSpacing: "1px", textTransform: "uppercase", color: col, opacity: .75 }}>{"\u2605"} Book in advance</div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {tab === "budget" && (
        <div style={{ padding: "12px 16px 48px", maxWidth: "640px", margin: "0 auto" }}>
          <div style={{ background: "rgba(255,255,255,.03)", border: "1px solid rgba(255,255,255,.08)", borderRadius: "12px", padding: "18px", marginBottom: "18px" }}>
            <div style={{ ...dm, fontSize: "9px", letterSpacing: "2px", textTransform: "uppercase", color: "#e94560", marginBottom: "6px" }}>On-Ground Budget (flights booked!)</div>
            <div style={{ fontSize: "30px", fontWeight: 300, marginBottom: "3px" }}>${tL} {"\u2014"} ${tH}</div>
            <div style={{ ...dm, fontSize: "11.5px", color: "rgba(232,224,212,.4)" }}>32 days. 3 countries. Horse trek + yurts + eagle hunters.</div>
          </div>
          {Object.entries(budgetSummary).map(([k, v]) => (
            <div key={k} style={{ marginBottom: "14px", padding: "0 4px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", ...dm, fontSize: "12px", marginBottom: "5px" }}>
                <span style={{ color: "rgba(232,224,212,.55)" }}>{v.label}</span>
                <span style={{ color: "#e9b344" }}>${v.low}{"\u2013"}${v.high}</span>
              </div>
              <div style={{ height: "5px", background: "rgba(255,255,255,.05)", borderRadius: "3px", overflow: "hidden" }}>
                <div style={{ height: "100%", width: (v.high / tH) * 100 + "%", background: "linear-gradient(90deg,#e94560,#e9b344)", borderRadius: "3px" }} />
              </div>
            </div>
          ))}
          <div style={{ borderTop: "1px solid rgba(255,255,255,.08)", paddingTop: "14px", marginTop: "8px", ...dm, fontSize: "11px", lineHeight: 1.8, color: "rgba(232,224,212,.45)" }}>
            <strong style={{ color: "rgba(232,224,212,.65)" }}>Visa costs:</strong> $0 {"\u2014"} Dutch passport visa-free everywhere<br />
            <strong style={{ color: "rgba(232,224,212,.65)" }}>International flights:</strong> Booked (Batik Air + Pegasus)<br />
            <strong style={{ color: "rgba(232,224,212,.65)" }}>Longest travel day:</strong> ~6 hrs (no 16-hr days)<br />
            <strong style={{ color: "rgba(232,224,212,.65)" }}>Not included:</strong> insurance, alcohol, shopping
          </div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
